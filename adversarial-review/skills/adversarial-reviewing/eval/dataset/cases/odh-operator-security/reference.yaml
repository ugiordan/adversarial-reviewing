- id: SEC-001
  jira: RHOAIENG-56110
  severity: Critical
  category: rbac
  source_trust: Authenticated
  file: internal/controller/services/auth/auth_controller_actions.go
  lines: 63-65
  title: RBAC operator precedence bug in auth group filter
  description: 'Operator precedence in boolean condition allows system:authenticated through for roles other than data-science-admingroup-role.
    The condition groups incorrectly, bypassing the group filter for all admin role bindings.

    '
  detection_signals:
  - system:authenticated
  - operator precedence
  - bindRole
  - group filter
- id: SEC-002
  severity: Important
  category: crypto
  source_trust: N/A
  file: pkg/cluster/cert.go
  lines: 106-118
  title: Server certificate marked as CA with unnecessary capabilities
  description: 'Self-signed server certificate set with IsCA=true and KeyUsageCertSign. Server certs should never be CAs.
    Also adds unconditional localhost SAN.

    '
  detection_signals:
  - IsCA
  - KeyUsageCertSign
  - x509.Certificate
  - localhost
- id: SEC-006
  severity: Important
  category: randomness
  source_trust: N/A
  file: pkg/cluster/cert.go
  lines: 91-91
  title: Weak certificate serial number entropy
  description: 'Certificate serial number uses time-dependent upper bound (time.Now().UnixNano()) providing only ~60 bits
    of entropy instead of 128-bit standard.

    '
