name: adversarial-reviewing-quick
description: 'Quick mode baseline: SEC agent only, default budget.

  Measures single-agent detection rate without external context.

  '
skill: adversarial-reviewing:adversarial-reviewing
execution:
  mode: case
  arguments: --security --no-budget --save {prompt}
  timeout: 5400
runner:
  type: claude-code
  plugin_dirs:
  - /Users/ugogiordano/workdir/rhoai/adversarial-review/.claude/worktrees/fsm-orchestrator/adversarial-review
  system_prompt: 'CRITICAL: You are a relay for the adversarial-reviewing orchestrator.
    Read SKILL.md and follow it EXACTLY. Your ONLY job is running orchestrator
    commands (init, confirm, next) and dispatching agents as instructed.

    RULES YOU MUST NOT BREAK:
    1. Run orchestrator init, then follow the dispatch.json loop
    2. Orchestrator commands may take up to 5 minutes. WAIT for them to finish.
       Do NOT investigate why they are slow. Do NOT read fsm-state.json.
       Do NOT grep or ls the filesystem. Do NOT call GitHub APIs. JUST WAIT.
    3. If any orchestrator command fails, STOP IMMEDIATELY. Do NOT retry.
       Do NOT re-initialize. Report the error and exit.
    4. After agents complete, run orchestrator next IMMEDIATELY. Do NOT read
       agent outputs. Do NOT write output files. Do NOT verify anything.
    5. Approve scope confirmation and budget escalation immediately.

    '
  settings:
    permissions:
      allow:
      - Bash(python3*)
      - Bash(cd*)
      - Bash(cat*)
      - Bash(cp*)
      - Bash(mkdir*)
      - Bash(ls*)
      - Bash(grep*)
      - Bash(wc*)
      - Bash(cymbal*)
      - Write(/var/folders/**)
      - Write(/private/var/folders/**)
      - Read(/tmp/**)
      - Read(/private/tmp/**)
      - Write(/tmp/**)
      - Write(/private/tmp/**)
      - Edit(/var/folders/**)
      - Edit(/private/var/folders/**)
      - Edit(/tmp/**)
      - Edit(/private/tmp/**)
      - Write(artifacts/**)
      additionalDirectories:
      - /Users/ugogiordano/workdir/rhoai/opendatahub-io/opendatahub-operator
      - /tmp
      - /private/tmp
models:
  skill: claude-opus-4-6
  judge: claude-opus-4-6
permissions:
  allow: []
  deny:
  - mcp__*
mlflow:
  experiment: adversarial-reviewing-eval
  tracking_uri: http://127.0.0.1:5050
dataset:
  path: eval/dataset/cases
  schema: "Each case directory contains:\n- input.yaml: The 'prompt' field contains the skill invocation\n  arguments (target\
    \ repo path and flags).\n- reference.yaml: Ground truth corpus with verified security\n  findings, detection signals,\
    \ and severity classifications.\n"
outputs:
- path: artifacts
  schema: 'The adversarial-reviewing skill saves its report as a markdown

    file via --save. The report contains structured findings with

    Finding ID, Severity, Confidence, Source Trust, File, Lines,

    Title, Evidence, and Recommended fix fields.

    '
traces:
  stdout: true
  stderr: true
  events: false
  metrics: true
judges:
- name: fsm_executed
  description: Verify the FSM orchestrator was actually invoked (not ad-hoc review)
  check: "stdout = outputs.get(\"stdout\", \"\")\nconfirm_ran = \"orchestrator confirm\" in stdout or \"orchestrator next\"\
    \ in stdout\ninit_ran = \"orchestrator init\" in stdout\nif not init_ran:\n  return False, \"orchestrator init was never\
    \ called - skill did not execute\"\nif not confirm_ran:\n  return False, \"orchestrator confirm/next never called - FSM\
    \ protocol not followed (relay may have improvised)\"\nreturn True, \"FSM orchestrator protocol was followed\"\n"
- name: has_findings
  description: Check that the review produced findings
  check: "content = outputs.get(\"artifacts_content\", \"\")\nif not content:\n  for k, v in outputs.get(\"files\", {}).items():\n\
    \    if v and len(v) > 100:\n      content = v\n      break\nif not content or len(content.strip()) < 200:\n  return False,\
    \ f\"No substantial output ({len(content)} chars)\"\nif \"Finding ID:\" not in content and \"SEC-\" not in content:\n\
    \  return False, \"Output exists but contains no structured findings\"\nreturn True, f\"Output has {len(content)} chars\
    \ with structured findings\"\n"
- name: detection_rate
  description: 'Score detection accuracy against ground truth corpus.

    Uses keyword matching and file path matching to map findings

    to known vulnerabilities. Returns detection rate (0.0-1.0).

    '
  module: eval.judges.detection_judge
  function: score_detection
- name: false_positive_rate
  description: 'Check that false positive rate stays under 20%.

    '
  module: eval.judges.detection_judge
  function: score_false_positive_rate
- name: severity_accuracy
  description: 'Score severity classification accuracy for matched findings.

    '
  module: eval.judges.detection_judge
  function: score_severity_accuracy
- name: cost_reasonable
  description: Verify per-case cost stays under budget
  check: "cost = outputs.get(\"cost_usd\", 0)\nif cost and cost > 80.0:\n  return False, f\"Cost ${cost:.2f} exceeds $80 limit\"\
    \nreturn True, f\"Cost ${cost:.2f}\" if cost else \"Cost not tracked\"\n"
thresholds:
  detection_rate:
    min_mean: 0.35
