name: adversarial-reviewing-sec
description: 'SEC agent only eval. Scores against security-filtered ground truth.

  Use this to evaluate and improve the security specialist in isolation.

  '
skill: adversarial-reviewing:adversarial-reviewing
execution:
  mode: case
  arguments: --security --no-budget --save {prompt}
  timeout: 7200
runner:
  type: claude-code
  plugin_dirs:
  - /Users/ugogiordano/workdir/rhoai/adversarial-review/adversarial-review
  system_prompt: |
    Read SKILL.md and run the command shown in the Quick start section.
    Use timeout: 600000 on the Bash tool call (the review takes 30-90 min).
    Wait for it to complete. When done, copy artifacts to workspace:
    mkdir -p artifacts && cp ${CLAUDE_SKILL_DIR}/artifacts/*.md artifacts/ 2>/dev/null
    Report the exit code and any errors.
  settings:
    permissions:
      allow:
      - Bash(python3*)
      - Bash(cd*)
      - Bash(cat*)
      - Bash(cp*)
      - Bash(mkdir*)
      - Bash(ls*)
      - Bash(grep*)
      - Bash(wc*)
      - Bash(cymbal*)
      - Write(/var/folders/**)
      - Write(/private/var/folders/**)
      - Read(/tmp/**)
      - Read(/private/tmp/**)
      - Write(/tmp/**)
      - Write(/private/tmp/**)
      - Edit(/var/folders/**)
      - Edit(/private/var/folders/**)
      - Edit(/tmp/**)
      - Edit(/private/tmp/**)
      - Write(artifacts/**)
      additionalDirectories:
      - /Users/ugogiordano/workdir/rhoai/opendatahub-io/opendatahub-operator
      - /Users/ugogiordano/workdir/rhoai/opendatahub-io/kube-auth-proxy
      - /Users/ugogiordano/workdir/rhoai/opendatahub-io/odh-model-controller
      - /tmp
      - /private/tmp
models:
  skill: claude-opus-4-6
  judge: claude-opus-4-6
permissions:
  allow: []
  deny:
  - mcp__*
mlflow:
  experiment: adversarial-reviewing-eval
  tracking_uri: http://127.0.0.1:5050
dataset:
  path: eval/dataset/cases
  schema: "Each case directory contains:\n- input.yaml: The 'prompt' field contains the skill invocation\n  arguments (target\
    \ repo path and flags).\n- reference.yaml: Ground truth corpus with verified security\n  findings, detection signals,\
    \ and severity classifications.\n"
outputs:
- path: artifacts
  schema: 'The adversarial-reviewing skill saves its report as a markdown

    file via --save. The report contains structured findings with

    Finding ID, Severity, Confidence, Source Trust, File, Lines,

    Title, Evidence, and Recommended fix fields.

    '
traces:
  stdout: true
  stderr: true
  events: false
  metrics: true
judges:
- name: fsm_executed
  description: Verify the FSM orchestrator was actually invoked (not ad-hoc review)
  check: |
    import os, json
    from pathlib import Path
    stdout = outputs.get("stdout", "")
    if not stdout:
        case_dir = outputs.get("case_dir", "")
        if case_dir:
            p = Path(case_dir) / "stdout.log"
            if p.exists():
                stdout = p.read_text(errors="replace")
    if not stdout:
        return False, "No stdout available"
    # Search both assistant text AND tool_use commands in JSONL
    search_text = stdout
    if stdout.strip().startswith("{"):
        parts = []
        for line in stdout.splitlines():
            try:
                msg = json.loads(line)
                m = msg.get("message", {})
                if m.get("role") == "assistant":
                    content = m.get("content", [])
                    if isinstance(content, list):
                        for block in content:
                            if isinstance(block, dict):
                                if block.get("type") == "text":
                                    parts.append(block.get("text", ""))
                                elif block.get("type") == "tool_use":
                                    cmd = block.get("input", {})
                                    if isinstance(cmd, dict):
                                        parts.append(cmd.get("command", ""))
                    elif isinstance(content, str):
                        parts.append(content)
            except (json.JSONDecodeError, ValueError):
                pass
        search_text = "\n".join(parts) if parts else stdout
    has_init = "scripts.orchestrator init" in search_text or "orchestrator init" in search_text
    has_next = "scripts.orchestrator next" in search_text or "orchestrator next" in search_text
    has_confirm = "scripts.orchestrator confirm" in search_text or "orchestrator confirm" in search_text
    if not has_init:
        return False, "orchestrator init was never called - skill did not execute"
    if not has_next and not has_confirm:
        return False, "orchestrator confirm/next never called - FSM protocol not followed"
    return True, "FSM orchestrator protocol was followed"
- name: has_findings
  description: Check that the review produced findings
  check: |
    import os
    from pathlib import Path
    # Prefer artifact files (clean, no JSONL noise)
    content = ""
    for k, v in outputs.get("files", {}).items():
        if v and len(v) > 100 and "output" in k.lower() and "REPORT" not in k:
            content = v
            break
    if not content:
        content = outputs.get("artifacts_content", "")
    if not content:
        # Fallback to raw stdout decode
        stdout = outputs.get("stdout", "")
        if not stdout:
            case_dir = outputs.get("case_dir", "")
            if case_dir:
                p = Path(case_dir) / "stdout.log"
                if p.exists():
                    stdout = p.read_text(errors="replace")
        if stdout:
            decoded = stdout.replace("\\\\n", "\n").replace("\\n", "\n")
            if "Finding ID:" in decoded:
                content = decoded
    if not content or len(content.strip()) < 200:
        return False, f"No substantial output ({len(content) if content else 0} chars)"
    if "Finding ID:" not in content and "SEC-" not in content:
        return False, "Output exists but contains no structured findings"
    return True, f"Output has {len(content)} chars with structured findings"
- name: detection_rate
  description: 'Score detection accuracy against ground truth corpus.

    Uses keyword matching and file path matching to map findings

    to known vulnerabilities. Returns detection rate (0.0-1.0).

    '
  module: eval.judges.detection_judge
  function: score_detection
- name: false_positive_rate
  description: 'Check that false positive rate stays under 20%.

    '
  module: eval.judges.detection_judge
  function: score_false_positive_rate
- name: severity_accuracy
  description: 'Score severity classification accuracy for matched findings.

    '
  module: eval.judges.detection_judge
  function: score_severity_accuracy
- name: cost_reasonable
  description: Verify per-case cost stays under budget
  check: |
    import json
    from pathlib import Path
    cost = outputs.get("cost_usd", 0)
    # Prefer per-case cost from case run_result.json
    case_dir = outputs.get("case_dir", "")
    if case_dir:
        rr = Path(case_dir) / "run_result.json"
        if rr.exists():
            try:
                data = json.loads(rr.read_text())
                case_cost = data.get("cost_usd", 0)
                if case_cost:
                    cost = case_cost
            except (json.JSONDecodeError, OSError):
                pass
    if cost and cost > 50.0:
        return False, f"Cost ${cost:.2f} exceeds $50 per-case limit"
    return True, f"Cost ${cost:.2f}" if cost else "Cost not tracked"
thresholds:
  detection_rate:
    min_mean: 0.60
