# Hotspot patterns for code profile
# The orchestrator greps for these patterns before dispatching agents.
# Results are included as hotspots.md in each agent's dispatch directory.

SEC:
  - pattern: "IsCA"
    description: "Self-signed CA certificates used as leaf certs"
  - pattern: "InsecureSkipVerify"
    description: "TLS verification bypass"
  - pattern: "system:authenticated"
    description: "Broad RBAC bindings to all authenticated users"
  - pattern: "verbs=\\*"
    description: "Wildcard RBAC verbs (implicit escalate/bind)"
  - pattern: "aggregate-to-edit"
    description: "Implicit role expansion via label aggregation"
  - pattern: "SecretNamespace"
    description: "Cross-namespace secret access (confused deputy)"
  - pattern: "GrantHandlerAuto"
    description: "OAuth consent bypass"
  - pattern: ":latest"
    description: "Unpinned container images"
  - pattern: "GenerateRandomHex"
    description: "Entropy and randomness issues"
  - pattern: "base64"
    description: "Hardcoded secrets or credentials"
  - pattern: "SerialNumber"
    description: "Certificate serial number entropy"
  - pattern: "ssl-insecure-skip-verify"
    description: "TLS bypass in templates"
  - pattern: "Issuer"
    description: "OIDC/OAuth issuer URL or name fields"
  - pattern: "SecretName"
    description: "Secret name fields without DNS-1123 validation"
  - pattern: "os.WriteFile"
    description: "File write with explicit permissions (mode 0 risk)"
  - pattern: "NewCache"
    description: "Informer cache without selectors (OOM/DoS risk)"
  - pattern: "RELATED_IMAGE"
    description: "Container image fallback to unpinned tags"
  - pattern: "ubi-minimal"
    description: "Unpinned base images in Dockerfile"
  - pattern: "segmentKey"
    description: "Hardcoded analytics keys"
  - pattern: "monitoring.go"
    description: "Monitoring secrets and credentials"
  - pattern: "htpasswd"
    description: "Password file generation"

CORR:
  - pattern: "History\\[0\\]"
    description: "Unguarded array access on Status fields"
  - pattern: "Items\\[0\\]"
    description: "Unguarded array access on List results"
  - pattern: "panic("
    description: "Explicit panics in non-test code"
  - pattern: "admission.Response"
    description: "Webhook admission response handling"
  - pattern: "Handle("
    description: "Webhook handler implementations"
  - pattern: "err != nil"
    description: "Error handling patterns"

PERF:
  - pattern: "NewCache"
    description: "Informer cache configuration"
  - pattern: "DeepCopy"
    description: "Deep copies in hot paths"
  - pattern: "GOMEMLIMIT"
    description: "Memory limit configuration"
  - pattern: "LabelSelector"
    description: "Cache label selectors for filtering"
  - pattern: "DefaultTransform"
    description: "Informer transform functions"

QUAL:
  - pattern: "WriteFile"
    description: "File write operations and permissions"
  - pattern: "GenerateRandom"
    description: "Random value generation (naming accuracy)"
  - pattern: "ReplaceStringsInFile"
    description: "String manipulation of structured files"
  - pattern: "mode 0"
    description: "Zero file permissions"
  - pattern: "TODO"
    description: "Incomplete implementations near security code"
  - pattern: "os.WriteFile"
    description: "File write with explicit permissions check"
  - pattern: "numBytes"
    description: "Byte count vs expected entropy"

ARCH:
  - pattern: "OwnerReference"
    description: "Resource ownership and lifecycle tracking"
  - pattern: "Reconcile("
    description: "Reconciler implementations"
  - pattern: "aggregate-to"
    description: "RBAC aggregation labels"
  - pattern: "SetupWithManager"
    description: "Controller registration points"
  - pattern: "NewCache"
    description: "Cache architecture decisions"
  - pattern: "Dockerfile"
    description: "Container image build configuration"
